<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitung Hari-Hari Ji..</title>
    <meta name="description" content="nunggu lama banget">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Sacramento&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Quicksand', 'sans-serif'],
                        'script': ['Sacramento', 'cursive'],
                    },
                    colors: {
                        'dream': {
                            50: '#f0f7ff',
                            100: '#e0efff',
                            200: '#b9dfff',
                            300: '#7cc4ff',
                            400: '#36a6ff',
                            500: '#0c8aff',
                            600: '#006bdf',
                            700: '#0054b4',
                            800: '#004894',
                            900: '#003d7a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, #dbeafe 0%, #e0e7ff 25%, #ede9fe 50%, #dbeafe 75%, #bfdbfe 100%);
            background-size: 400% 400%;
            animation: gradientDrift 20s ease infinite;
        }

        @keyframes gradientDrift {
            0% {
                background-position: 0% 50%;
            }

            25% {
                background-position: 100% 0%;
            }

            50% {
                background-position: 100% 50%;
            }

            75% {
                background-position: 0% 100%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.35;
            animation: floatOrb linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #93c5fd, #a5b4fc);
            top: -80px;
            left: -80px;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #c4b5fd, #a5b4fc);
            bottom: -60px;
            right: -60px;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #bfdbfe, #ddd6fe);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 35s;
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(40px, -30px) scale(1.05);
            }

            50% {
                transform: translate(-20px, 20px) scale(0.95);
            }

            75% {
                transform: translate(30px, 40px) scale(1.02);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        /* Sparkle particles */
        .sparkle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            animation: sparkleFloat linear infinite;
        }

        @keyframes sparkleFloat {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0);
            }

            10% {
                opacity: 0.8;
                transform: translateY(-20px) scale(1);
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 0;
                transform: translateY(-120px) scale(0.3);
            }
        }

        /* Glass card */
        .glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow:
                0 8px 32px rgba(147, 197, 253, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        /* Number flip animation */
        .time-digit {
            display: inline-block;
            min-width: 1.2em;
            text-align: center;
            font-variant-numeric: tabular-nums;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.3s ease;
        }

        .time-digit.flip {
            transform: translateY(-6px);
            opacity: 0.4;
        }

        /* Gentle pulse for the colon separators */
        .colon-pulse {
            animation: colonPulse 2s ease-in-out infinite;
        }

        @keyframes colonPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* Subtle breathing animation for labels */
        .breathe {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {

            0%,
            100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        /* Divider line */
        .divider-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(147, 197, 253, 0.5), rgba(196, 181, 253, 0.5), transparent);
        }

        /* ─── Airplane animation ─── */
        .airplane-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .airplane-svg {
            width: 100%;
            height: 100%;
        }

        /* Dotted trail that draws itself */
        .trail-path {
            fill: none;
            stroke: rgba(147, 197, 253, 0.4);
            stroke-width: 1.5;
            stroke-dasharray: 6 8;
            stroke-linecap: round;
            stroke-dashoffset: 2000;
            opacity: 0;
        }

        /* Second trail for layered effect */
        .trail-path-2 {
            fill: none;
            stroke: rgba(196, 181, 253, 0.3);
            stroke-width: 1;
            stroke-dasharray: 4 12;
            stroke-linecap: round;
            stroke-dashoffset: 2000;
            opacity: 0;
        }

        /* Airplane icon that follows the path */
        #plane-group {
            opacity: 0;
            filter: drop-shadow(0 2px 8px rgba(147, 197, 253, 0.5));
        }

        /* Entry animation */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s ease forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up-delay-1 {
            animation-delay: 0.2s;
        }

        .fade-up-delay-2 {
            animation-delay: 0.5s;
        }

        .fade-up-delay-3 {
            animation-delay: 0.8s;
        }

        .fade-up-delay-4 {
            animation-delay: 1.1s;
        }
    </style>
</head>

<body class="font-sans text-slate-700 h-full">

    <!-- Floating orbs background -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Sparkle particles container -->
    <div id="sparkles-container"></div>

    <!-- Airplane with dotted trail -->
    <div class="airplane-layer" id="airplane-layer">
        <svg class="airplane-svg" id="airplane-svg" viewBox="0 0 1000 600" preserveAspectRatio="none">
            <!-- Dotted trail paths -->
            <path id="flight-path" class="trail-path"
                d="M -40,420 C 120,380 200,180 350,200 S 500,380 600,280 S 780,100 1040,160" />
            <path class="trail-path-2" d="M -40,420 C 120,380 200,180 350,200 S 500,380 600,280 S 780,100 1040,160" />
            <!-- Airplane SVG icon -->
            <g id="plane-group">
                <polygon id="plane-shape" points="0,-8 -3,8 0,5 3,8" fill="rgba(100,160,220,0.7)" />
            </g>
        </svg>
    </div>

    <!-- Main content -->
    <main class="relative z-10 h-full flex flex-col items-center justify-center px-4 sm:px-6">

        <!-- Title -->
        <div class="text-center mb-6 sm:mb-8 fade-up">
            <h1 class="font-script text-4xl sm:text-5xl md:text-6xl text-dream-600/80 mb-1 tracking-wide">
                Lama Banget Nungguin
            </h1>
            <p class="text-xs sm:text-sm text-slate-400 font-light tracking-widest uppercase breathe">
                annyeong chagi
            </p>
        </div>

        <!-- Countdown Card -->
        <div
            class="glass rounded-2xl sm:rounded-3xl p-4 sm:p-6 md:p-8 w-full max-w-lg mb-4 sm:mb-6 fade-up fade-up-delay-1">
            <p class="text-center text-xs sm:text-sm font-medium text-slate-400 tracking-widest uppercase mb-3 sm:mb-4">
                BALIK SURABAYA
            </p>
            <div id="countdown-display" class="flex items-center justify-center gap-1 sm:gap-2 text-slate-600">
                <!-- Days -->
                <div class="text-center">
                    <div class="text-3xl sm:text-4xl md:text-5xl font-bold tracking-tight">
                        <span class="time-digit" id="countdown-days">00</span>
                    </div>
                    <p class="text-[10px] sm:text-xs text-slate-400 mt-1 font-medium uppercase tracking-wider">Days</p>
                </div>
                <span
                    class="text-2xl sm:text-3xl md:text-4xl font-light text-dream-300 colon-pulse self-start mt-1">:</span>
                <!-- Hours -->
                <div class="text-center">
                    <div class="text-3xl sm:text-4xl md:text-5xl font-bold tracking-tight">
                        <span class="time-digit" id="countdown-hours">00</span>
                    </div>
                    <p class="text-[10px] sm:text-xs text-slate-400 mt-1 font-medium uppercase tracking-wider">Hours</p>
                </div>
                <span
                    class="text-2xl sm:text-3xl md:text-4xl font-light text-dream-300 colon-pulse self-start mt-1">:</span>
                <!-- Minutes -->
                <div class="text-center">
                    <div class="text-3xl sm:text-4xl md:text-5xl font-bold tracking-tight">
                        <span class="time-digit" id="countdown-mins">00</span>
                    </div>
                    <p class="text-[10px] sm:text-xs text-slate-400 mt-1 font-medium uppercase tracking-wider">Mins</p>
                </div>
                <span
                    class="text-2xl sm:text-3xl md:text-4xl font-light text-dream-300 colon-pulse self-start mt-1">:</span>
                <!-- Seconds -->
                <div class="text-center">
                    <div class="text-3xl sm:text-4xl md:text-5xl font-bold tracking-tight">
                        <span class="time-digit" id="countdown-secs">00</span>
                    </div>
                    <p class="text-[10px] sm:text-xs text-slate-400 mt-1 font-medium uppercase tracking-wider">Secs</p>
                </div>
            </div>
        </div>

        <!-- Divider -->
        <div class="w-32 sm:w-48 divider-line mb-4 sm:mb-6 fade-up fade-up-delay-2"></div>

        <!-- Time Elapsed Card -->
        <div class="glass rounded-2xl sm:rounded-3xl p-4 sm:p-6 md:p-8 w-full max-w-lg fade-up fade-up-delay-3">
            <p class="text-center text-xs sm:text-sm font-medium text-slate-400 tracking-widest uppercase mb-3 sm:mb-4">
                NUNGGUIN
            </p>
            <div id="elapsed-display" class="flex items-center justify-center gap-1 sm:gap-2 text-slate-600">
                <!-- Days -->
                <div class="text-center">
                    <div class="text-3xl sm:text-4xl md:text-5xl font-bold tracking-tight">
                        <span class="time-digit" id="elapsed-days">00</span>
                    </div>
                    <p class="text-[10px] sm:text-xs text-slate-400 mt-1 font-medium uppercase tracking-wider">Days</p>
                </div>
                <span
                    class="text-2xl sm:text-3xl md:text-4xl font-light text-dream-300 colon-pulse self-start mt-1">:</span>
                <!-- Hours -->
                <div class="text-center">
                    <div class="text-3xl sm:text-4xl md:text-5xl font-bold tracking-tight">
                        <span class="time-digit" id="elapsed-hours">00</span>
                    </div>
                    <p class="text-[10px] sm:text-xs text-slate-400 mt-1 font-medium uppercase tracking-wider">Hours</p>
                </div>
                <span
                    class="text-2xl sm:text-3xl md:text-4xl font-light text-dream-300 colon-pulse self-start mt-1">:</span>
                <!-- Minutes -->
                <div class="text-center">
                    <div class="text-3xl sm:text-4xl md:text-5xl font-bold tracking-tight">
                        <span class="time-digit" id="elapsed-mins">00</span>
                    </div>
                    <p class="text-[10px] sm:text-xs text-slate-400 mt-1 font-medium uppercase tracking-wider">Mins</p>
                </div>
                <span
                    class="text-2xl sm:text-3xl md:text-4xl font-light text-dream-300 colon-pulse self-start mt-1">:</span>
                <!-- Seconds -->
                <div class="text-center">
                    <div class="text-3xl sm:text-4xl md:text-5xl font-bold tracking-tight">
                        <span class="time-digit" id="elapsed-secs">00</span>
                    </div>
                    <p class="text-[10px] sm:text-xs text-slate-400 mt-1 font-medium uppercase tracking-wider">Secs</p>
                </div>
            </div>
        </div>

        <!-- Date range label -->
        <p
            class="text-[10px] sm:text-xs text-slate-400/70 mt-4 sm:mt-6 tracking-wider font-light fade-up fade-up-delay-4">
            27 Jun 2026, 08:00 — 11 Aug 2026, 23:59
        </p>

    </main>

    <script>
        // ─── Hard-coded dates (local time) ───
        const START_TIME = new Date(2026, 5, 27, 8, 0, 0);  // Jun 27, 2026 08:00:00
        const END_TIME = new Date(2026, 7, 11, 23, 59, 59); // Aug 11, 2026 23:59:59

        // ─── Previous values for flip animation ───
        const prev = {
            'elapsed-days': '', 'elapsed-hours': '', 'elapsed-mins': '', 'elapsed-secs': '',
            'countdown-days': '', 'countdown-hours': '', 'countdown-mins': '', 'countdown-secs': ''
        };

        function pad(n) {
            return String(n).padStart(2, '0');
        }

        function updateDigit(id, value) {
            const el = document.getElementById(id);
            const val = String(value);
            if (prev[id] !== val) {
                el.classList.add('flip');
                setTimeout(() => {
                    el.textContent = val;
                    el.classList.remove('flip');
                }, 150);
                prev[id] = val;
            }
        }

        function calcTimeParts(totalSeconds) {
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = totalSeconds % 60;
            return { days, hours, mins, secs };
        }

        function tick() {
            const now = new Date();

            // ── Time elapsed since START ──
            let elapsedSec = Math.floor((now - START_TIME) / 1000);
            if (elapsedSec < 0) elapsedSec = 0;

            const elapsed = calcTimeParts(elapsedSec);
            updateDigit('elapsed-days', elapsed.days);
            updateDigit('elapsed-hours', pad(elapsed.hours));
            updateDigit('elapsed-mins', pad(elapsed.mins));
            updateDigit('elapsed-secs', pad(elapsed.secs));

            // ── Countdown to END ──
            let remainingSec = Math.floor((END_TIME - now) / 1000);
            if (remainingSec < 0) remainingSec = 0;

            const remaining = calcTimeParts(remainingSec);
            updateDigit('countdown-days', remaining.days);
            updateDigit('countdown-hours', pad(remaining.hours));
            updateDigit('countdown-mins', pad(remaining.mins));
            updateDigit('countdown-secs', pad(remaining.secs));

            // ── Dynamic tab title ──
            document.title = `${remaining.days}d ${pad(remaining.hours)}h ${pad(remaining.mins)}m ${pad(remaining.secs)}s — Balik Surabaya`;
        }

        // ─── Sparkle particles ───
        function createSparkle() {
            const container = document.getElementById('sparkles-container');
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = (30 + Math.random() * 60) + 'vh';
            sparkle.style.animationDuration = (3 + Math.random() * 4) + 's';
            sparkle.style.animationDelay = Math.random() * 2 + 's';
            sparkle.style.width = (2 + Math.random() * 3) + 'px';
            sparkle.style.height = sparkle.style.width;
            container.appendChild(sparkle);

            setTimeout(() => sparkle.remove(), 8000);
        }

        // Start everything
        tick();
        setInterval(tick, 1000);
        setInterval(createSparkle, 600);

        // Create initial batch of sparkles
        for (let i = 0; i < 8; i++) {
            setTimeout(createSparkle, i * 200);
        }

        // ─── Airplane animation ───
        (function () {
            const path = document.getElementById('flight-path');
            const planeGroup = document.getElementById('plane-group');
            const trail1 = document.querySelector('.trail-path');
            const trail2 = document.querySelector('.trail-path-2');
            if (!path || !planeGroup) return;

            const totalLength = path.getTotalLength();
            const duration = 14000; // 14 seconds
            const pauseBetween = 4000; // 4s pause between loops
            const maxOffset = 2000;
            let startTime = null;
            let paused = false;

            function animatePlane(timestamp) {
                if (paused) {
                    startTime = null;
                    requestAnimationFrame(animatePlane);
                    return;
                }

                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / duration, 1);

                const dist = progress * totalLength;
                const point = path.getPointAtLength(dist);

                // Get angle from a nearby point
                const nextDist = Math.min(dist + 2, totalLength);
                const nextPoint = path.getPointAtLength(nextDist);
                const angle = Math.atan2(nextPoint.y - point.y, nextPoint.x - point.x) * (180 / Math.PI) + 90;

                // Fade in/out
                let opacity = 1;
                if (progress < 0.05) opacity = progress / 0.05;
                else if (progress > 0.9) opacity = (1 - progress) / 0.1;

                planeGroup.setAttribute('transform', `translate(${point.x}, ${point.y}) rotate(${angle})`);
                planeGroup.style.opacity = opacity;

                // Sync trail drawing
                const trailOffset = maxOffset * (1 - progress);
                let trailOpacity = 0;
                if (progress < 0.05) trailOpacity = progress / 0.05 * 0.5;
                else if (progress < 0.85) trailOpacity = 0.5 - (progress - 0.05) * 0.15 / 0.8;
                else trailOpacity = 0.35 * (1 - (progress - 0.85) / 0.15);

                if (trail1) {
                    trail1.style.strokeDashoffset = trailOffset;
                    trail1.style.opacity = trailOpacity;
                }
                if (trail2) {
                    trail2.style.strokeDashoffset = trailOffset;
                    trail2.style.opacity = trailOpacity * 0.6;
                }

                if (progress < 1) {
                    requestAnimationFrame(animatePlane);
                } else {
                    // Pause then restart
                    planeGroup.style.opacity = 0;
                    if (trail1) { trail1.style.opacity = 0; trail1.style.strokeDashoffset = maxOffset; }
                    if (trail2) { trail2.style.opacity = 0; trail2.style.strokeDashoffset = maxOffset; }
                    paused = true;
                    setTimeout(() => {
                        paused = false;
                        startTime = null;
                    }, pauseBetween);
                    requestAnimationFrame(animatePlane);
                }
            }

            requestAnimationFrame(animatePlane);
        })();
    </script>

</body>

</html>
