<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udah Berapa Lama nih Ji..</title>
    <meta name="description" content="Stats Since May 24, 2026">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Sacramento&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Quicksand', 'sans-serif'],
                        'script': ['Sacramento', 'cursive'],
                    },
                    colors: {
                        'dream': {
                            50: '#f0f7ff',
                            100: '#e0efff',
                            200: '#b9dfff',
                            300: '#7cc4ff',
                            400: '#36a6ff',
                            500: '#0c8aff',
                            600: '#006bdf',
                            700: '#0054b4',
                            800: '#004894',
                            900: '#003d7a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            background: linear-gradient(135deg, #dbeafe 0%, #e0e7ff 25%, #ede9fe 50%, #dbeafe 75%, #bfdbfe 100%);
            background-size: 400% 400%;
            animation: gradientDrift 20s ease infinite;
        }

        @keyframes gradientDrift {
            0% {
                background-position: 0% 50%;
            }

            25% {
                background-position: 100% 0%;
            }

            50% {
                background-position: 100% 50%;
            }

            75% {
                background-position: 0% 100%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.35;
            animation: floatOrb linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #93c5fd, #a5b4fc);
            top: -80px;
            left: -80px;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #c4b5fd, #a5b4fc);
            bottom: -60px;
            right: -60px;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #bfdbfe, #ddd6fe);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 35s;
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(40px, -30px) scale(1.05);
            }

            50% {
                transform: translate(-20px, 20px) scale(0.95);
            }

            75% {
                transform: translate(30px, 40px) scale(1.02);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        /* Sparkle particles */
        .sparkle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            animation: sparkleFloat linear infinite;
        }

        @keyframes sparkleFloat {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0);
            }

            10% {
                opacity: 0.8;
                transform: translateY(-20px) scale(1);
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 0;
                transform: translateY(-120px) scale(0.3);
            }
        }

        /* Glass card */
        .glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow:
                0 8px 32px rgba(147, 197, 253, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        /* Number flip animation */
        .time-digit {
            display: inline-block;
            min-width: 1.2em;
            text-align: center;
            font-variant-numeric: tabular-nums;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.3s ease;
        }

        .time-digit.flip {
            transform: translateY(-6px);
            opacity: 0.4;
        }

        /* Gentle pulse for the colon separators */
        .colon-pulse {
            animation: colonPulse 2s ease-in-out infinite;
        }

        @keyframes colonPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* Entry animation */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s ease forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up-delay-1 {
            animation-delay: 0.2s;
        }

        .fade-up-delay-2 {
            animation-delay: 0.5s;
        }

        .fade-up-delay-3 {
            animation-delay: 0.8s;
        }

        /* Divider line */
        .divider-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(147, 197, 253, 0.5), rgba(196, 181, 253, 0.5), transparent);
        }
    </style>
</head>

<body class="font-sans text-slate-700">

    <!-- Floating orbs background -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Sparkle particles container -->
    <div id="sparkles-container"></div>

    <!-- Main content -->
    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-4 sm:px-6 py-12">

        <!-- Title -->
        <div class="text-center mb-6 sm:mb-8 fade-up">
            <h1 class="font-script text-5xl sm:text-6xl md:text-7xl text-dream-600/80 mb-1 tracking-wide">
                Stats
            </h1>
            <p class="text-xs sm:text-sm text-slate-400 font-light tracking-widest uppercase">
                Siap yang Statnya AFL 100
            </p>
        </div>

        <!-- Stopwatch Elapsed Card -->
        <div class="glass rounded-2xl sm:rounded-3xl p-6 sm:p-8 md:p-10 w-full max-w-lg fade-up fade-up-delay-1">
            <p class="text-center text-xs sm:text-sm font-medium text-slate-400 tracking-widest uppercase mb-4 sm:mb-6">
                UDAH DEKET SEJAK.....
            </p>

            <div id="elapsed-display" class="flex items-center justify-center gap-1 sm:gap-1.5 md:gap-2 text-slate-600">
                <!-- Years -->
                <div class="text-center">
                    <div class="text-2xl sm:text-3xl md:text-4xl font-bold tracking-tight">
                        <span class="time-digit" id="elapsed-years">00</span>
                    </div>
                    <p class="text-[9px] sm:text-[10px] md:text-xs text-slate-400 mt-1 font-medium uppercase tracking-wider">Years</p>
                </div>
                <span class="text-xl sm:text-2xl md:text-3xl font-light text-dream-300 colon-pulse self-start mt-1">:</span>

                <!-- Months -->
                <div class="text-center">
                    <div class="text-2xl sm:text-3xl md:text-4xl font-bold tracking-tight">
                        <span class="time-digit" id="elapsed-months">00</span>
                    </div>
                    <p class="text-[9px] sm:text-[10px] md:text-xs text-slate-400 mt-1 font-medium uppercase tracking-wider">Months</p>
                </div>
                <span class="text-xl sm:text-2xl md:text-3xl font-light text-dream-300 colon-pulse self-start mt-1">:</span>

                <!-- Days -->
                <div class="text-center">
                    <div class="text-2xl sm:text-3xl md:text-4xl font-bold tracking-tight">
                        <span class="time-digit" id="elapsed-days">00</span>
                    </div>
                    <p class="text-[9px] sm:text-[10px] md:text-xs text-slate-400 mt-1 font-medium uppercase tracking-wider">Days</p>
                </div>
                <span class="text-xl sm:text-2xl md:text-3xl font-light text-dream-300 colon-pulse self-start mt-1">:</span>
                
                <!-- Hours -->
                <div class="text-center">
                    <div class="text-2xl sm:text-3xl md:text-4xl font-bold tracking-tight">
                        <span class="time-digit" id="elapsed-hours">00</span>
                    </div>
                    <p class="text-[9px] sm:text-[10px] md:text-xs text-slate-400 mt-1 font-medium uppercase tracking-wider">Hours</p>
                </div>
                <span class="text-xl sm:text-2xl md:text-3xl font-light text-dream-300 colon-pulse self-start mt-1">:</span>
                
                <!-- Minutes -->
                <div class="text-center">
                    <div class="text-2xl sm:text-3xl md:text-4xl font-bold tracking-tight">
                        <span class="time-digit" id="elapsed-mins">00</span>
                    </div>
                    <p class="text-[9px] sm:text-[10px] md:text-xs text-slate-400 mt-1 font-medium uppercase tracking-wider">Mins</p>
                </div>
                <span class="text-xl sm:text-2xl md:text-3xl font-light text-dream-300 colon-pulse self-start mt-1">:</span>
                
                <!-- Seconds -->
                <div class="text-center">
                    <div class="text-2xl sm:text-3xl md:text-4xl font-bold tracking-tight">
                        <span class="time-digit" id="elapsed-secs">00</span>
                    </div>
                    <p class="text-[9px] sm:text-[10px] md:text-xs text-slate-400 mt-1 font-medium uppercase tracking-wider">Secs</p>
                </div>
            </div>
        </div>

        <!-- Date range label -->
        <p
            class="text-[10px] sm:text-xs text-slate-400/70 mt-4 sm:mt-6 tracking-wider font-light fade-up fade-up-delay-2">
            Since 24 May 2026, 00:00:00
        </p>

        <!-- Divider -->
        <div class="w-32 sm:w-48 divider-line my-6 fade-up fade-up-delay-2"></div>

        <!-- Percentages Cards -->
        <div class="flex flex-col sm:flex-row gap-4 w-full max-w-lg fade-up fade-up-delay-2">
            <!-- Card 1: Samo -->
            <div class="glass rounded-2xl sm:rounded-3xl p-6 flex-1 text-center">
                <p class="text-xs sm:text-sm font-semibold text-slate-400 tracking-widest uppercase mb-2">
                    SAMO
                </p>
                <div class="text-2xl sm:text-3xl font-bold text-slate-600 tracking-tight" id="samo-pct">
                    0.0000000%
                </div>
                <div class="text-[11px] sm:text-xs text-slate-500 font-semibold tracking-wide mt-2" id="samo-timer">
                    0y 0m 0d 00h 00m 00s
                </div>
                <!-- Progress bar starting from right side -->
                <div class="w-full h-1.5 bg-slate-200/50 rounded-full overflow-hidden mt-3 mb-1.5 flex justify-end">
                    <div id="samo-bar" class="h-full bg-gradient-to-r from-dream-400 to-indigo-400 rounded-full transition-all duration-500" style="width: 0%;"></div>
                </div>
                <p class="text-[10px] sm:text-xs text-slate-400/70 mt-1.5 font-light">
                    Since 6 Oct 2007
                </p>
            </div>
 
            <!-- Card 2: Bee -->
            <div class="glass rounded-2xl sm:rounded-3xl p-6 flex-1 text-center">
                <p class="text-xs sm:text-sm font-semibold text-slate-400 tracking-widest uppercase mb-2">
                    BEE
                </p>
                <div class="text-2xl sm:text-3xl font-bold text-slate-600 tracking-tight" id="bee-pct">
                    0.0000000%
                </div>
                <div class="text-[11px] sm:text-xs text-slate-500 font-semibold tracking-wide mt-2" id="bee-timer">
                    0y 0m 0d 00h 00m 00s
                </div>
                <!-- Progress bar starting from right side -->
                <div class="w-full h-1.5 bg-slate-200/50 rounded-full overflow-hidden mt-3 mb-1.5 flex justify-end">
                    <div id="bee-bar" class="h-full bg-gradient-to-r from-dream-400 to-indigo-400 rounded-full transition-all duration-500" style="width: 0%;"></div>
                </div>
                <p class="text-[10px] sm:text-xs text-slate-400/70 mt-1.5 font-light">
                    Since 7 Jul 2006
                </p>
            </div>
        </div>

        <!-- Navigation Back -->
        <div class="mt-8 fade-up fade-up-delay-3">
            <a href="../index.html"
                class="glass px-6 py-2.5 rounded-full text-xs sm:text-sm font-medium text-slate-500 hover:text-dream-600 transition-all duration-300 hover:shadow-lg flex items-center gap-2 hover:scale-105 active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" class="w-3.5 h-3.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
                <span>Back to Timer</span>
            </a>
        </div>

    </main>

    <script>
        // ─── Hard-coded dates ───
        const START_TIME = new Date(2026, 4, 24, 0, 0, 0);  // May 24, 2026 00:00:00
        const SAMO_START = new Date(2007, 9, 6, 0, 0, 0);  // Oct 6, 2007 00:00:00
        const BEE_START = new Date(2006, 6, 7, 0, 0, 0);   // Jul 7, 2006 00:00:00

        // ─── Previous values for flip animation ───
        const prev = {
            'elapsed-years': '', 'elapsed-months': '', 'elapsed-days': '', 'elapsed-hours': '', 'elapsed-mins': '', 'elapsed-secs': ''
        };

        function pad(n) {
            return String(n).padStart(2, '0');
        }

        function updateDigit(id, value) {
            const el = document.getElementById(id);
            const val = String(value);
            if (prev[id] !== val) {
                el.classList.add('flip');
                setTimeout(() => {
                    el.textContent = val;
                    el.classList.remove('flip');
                }, 150);
                prev[id] = val;
            }
        }

        function calcTimeParts(totalSeconds) {
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = totalSeconds % 60;
            return { days, hours, mins, secs };
        }

        function calcDetailedTimeParts(startDate, endDate) {
            let years = endDate.getFullYear() - startDate.getFullYear();
            let months = endDate.getMonth() - startDate.getMonth();
            let days = endDate.getDate() - startDate.getDate();
            let hours = endDate.getHours() - startDate.getHours();
            let mins = endDate.getMinutes() - startDate.getMinutes();
            let secs = endDate.getSeconds() - startDate.getSeconds();

            if (secs < 0) {
                secs += 60;
                mins--;
            }
            if (mins < 0) {
                mins += 60;
                hours--;
            }
            if (hours < 0) {
                hours += 24;
                days--;
            }
            if (days < 0) {
                const prevMonth = new Date(endDate.getFullYear(), endDate.getMonth(), 0);
                days += prevMonth.getDate();
                months--;
            }
            if (months < 0) {
                months += 12;
                years--;
            }

            return { years, months, days, hours, mins, secs };
        }

        function tick() {
            const now = new Date();

            // ── Time elapsed since START (milliseconds) ──
            const msDeket = now - START_TIME;

            // Calculate exact detailed elapsed time for deket (years, months, days, hours, mins, secs)
            const deketElapsed = calcDetailedTimeParts(START_TIME, now);

            updateDigit('elapsed-years', pad(deketElapsed.years));
            updateDigit('elapsed-months', pad(deketElapsed.months));
            updateDigit('elapsed-days', pad(deketElapsed.days));
            updateDigit('elapsed-hours', pad(deketElapsed.hours));
            updateDigit('elapsed-mins', pad(deketElapsed.mins));
            updateDigit('elapsed-secs', pad(deketElapsed.secs));

            // ── Time elapsed for Samo and Bee (milliseconds) ──
            const msSamo = now - SAMO_START;
            const msBee = now - BEE_START;

            // Calculate percentages
            const pctSamo = msSamo > 0 ? (msDeket / msSamo) * 100 : 0;
            const pctBee = msBee > 0 ? (msDeket / msBee) * 100 : 0;

            // Update percentage card values to 7th decimal place
            document.getElementById('samo-pct').textContent = pctSamo.toFixed(7) + '%';
            document.getElementById('bee-pct').textContent = pctBee.toFixed(7) + '%';

            // Calculate exact detailed timers (years, months, days, hours, mins, secs)
            const samoElapsed = calcDetailedTimeParts(SAMO_START, now);
            const beeElapsed = calcDetailedTimeParts(BEE_START, now);

            // Update timer values
            document.getElementById('samo-timer').textContent = `${samoElapsed.years}y ${samoElapsed.months}m ${samoElapsed.days}d ${pad(samoElapsed.hours)}h ${pad(samoElapsed.mins)}m ${pad(samoElapsed.secs)}s`;
            document.getElementById('bee-timer').textContent = `${beeElapsed.years}y ${beeElapsed.months}m ${beeElapsed.days}d ${pad(beeElapsed.hours)}h ${pad(beeElapsed.mins)}m ${pad(beeElapsed.secs)}s`;

            // Update percentage bar widths
            document.getElementById('samo-bar').style.width = pctSamo + '%';
            document.getElementById('bee-bar').style.width = pctBee + '%';

            // ── Dynamic tab title ──
            document.title = `${deketElapsed.years}y ${deketElapsed.months}m ${deketElapsed.days}d ${pad(deketElapsed.hours)}h — Stats`;
        }

        // ─── Sparkle particles ───
        function createSparkle() {
            const container = document.getElementById('sparkles-container');
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = (30 + Math.random() * 60) + 'vh';
            sparkle.style.animationDuration = (3 + Math.random() * 4) + 's';
            sparkle.style.animationDelay = Math.random() * 2 + 's';
            sparkle.style.width = (2 + Math.random() * 3) + 'px';
            sparkle.style.height = sparkle.style.width;
            container.appendChild(sparkle);

            setTimeout(() => sparkle.remove(), 8000);
        }

        // Start everything
        tick();
        setInterval(tick, 1000);
        setInterval(createSparkle, 600);

        // Create initial batch of sparkles
        for (let i = 0; i < 8; i++) {
            setTimeout(createSparkle, i * 200);
        }
    </script>

</body>

</html>
