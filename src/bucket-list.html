<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucket List Ji...</title>
    <meta name="description" content="Bucket List">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Sacramento&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Quicksand', 'sans-serif'],
                        'script': ['Sacramento', 'cursive'],
                    },
                    colors: {
                        'dream': {
                            50: '#f0f7ff',
                            100: '#e0efff',
                            200: '#b9dfff',
                            300: '#7cc4ff',
                            400: '#36a6ff',
                            500: '#0c8aff',
                            600: '#006bdf',
                            700: '#0054b4',
                            800: '#004894',
                            900: '#003d7a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            background: linear-gradient(135deg, #dbeafe 0%, #e0e7ff 25%, #ede9fe 50%, #dbeafe 75%, #bfdbfe 100%);
            background-size: 400% 400%;
            animation: gradientDrift 20s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradientDrift {
            0% {
                background-position: 0% 50%;
            }

            25% {
                background-position: 100% 0%;
            }

            50% {
                background-position: 100% 50%;
            }

            75% {
                background-position: 0% 100%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.35;
            animation: floatOrb linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #93c5fd, #a5b4fc);
            top: -80px;
            left: -80px;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #c4b5fd, #a5b4fc);
            bottom: -60px;
            right: -60px;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #bfdbfe, #ddd6fe);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 35s;
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(40px, -30px) scale(1.05);
            }

            50% {
                transform: translate(-20px, 20px) scale(0.95);
            }

            75% {
                transform: translate(30px, 40px) scale(1.02);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        /* Sparkle particles */
        .sparkle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            animation: sparkleFloat linear infinite;
        }

        @keyframes sparkleFloat {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0);
            }

            10% {
                opacity: 0.8;
                transform: translateY(-20px) scale(1);
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 0;
                transform: translateY(-120px) scale(0.3);
            }
        }

        /* Glass card */
        .glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow:
                0 8px 32px rgba(147, 197, 253, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        /* Entry animation */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s ease forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up-delay-1 {
            animation-delay: 0.2s;
        }

        .fade-up-delay-2 {
            animation-delay: 0.5s;
        }
    </style>
</head>

<body class="font-sans text-slate-700">

    <!-- Floating orbs background -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Sparkle particles container -->
    <div id="sparkles-container"></div>

    <!-- Main content -->
    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-4 sm:px-6 py-12">

        <!-- Title -->
        <div class="text-center mb-6 sm:mb-8 fade-up">
            <h1 class="font-script text-5xl sm:text-6xl md:text-7xl text-dream-600/80 mb-1 tracking-wide">
                Bucket List<span class="invisible">1</span>
            </h1>
            <p class="text-xs sm:text-sm text-slate-400 font-light tracking-widest uppercase">
                😁
            </p>
        </div>

        <!-- Bucket List Card -->
        <div class="glass rounded-2xl sm:rounded-3xl p-6 sm:p-8 w-full max-w-lg fade-up fade-up-delay-1 flex flex-col">
            <!-- List Items -->
            <div id="bucket-list" class="space-y-3">

                <!-- 💡 HOW TO MAKE AN ITEM CHECKED (COMPLETED):

                <div class="flex items-center gap-3 p-3 rounded-xl border border-white/20 bg-white/5 opacity-75">
                    <div
                        class="w-4 h-4 rounded-full bg-gradient-to-r from-dream-400 to-indigo-400 flex items-center justify-center shadow-sm">
                        <svg class="w-2.5 h-2.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="4">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <span
                        class="text-sm text-slate-400/70 line-through decoration-dream-300/80 decoration-1 select-none">Item
                        Text</span>
                </div> -->

                <!-- Item 1 -->
                <div class="flex items-center gap-3 p-3 rounded-xl border border-white/20 bg-white/10">
                    <div class="w-2 h-2 rounded-full bg-dream-400"></div>
                    <span class="text-sm text-slate-600 font-medium select-none">cari helm</span>
                </div>
                <!-- Item 2 -->
                <div class="flex items-center gap-3 p-3 rounded-xl border border-white/20 bg-white/10">
                    <div class="w-2 h-2 rounded-full bg-dream-400"></div>
                    <span class="text-sm text-slate-600 font-medium select-none">PCM Shanghai</span>
                </div>
                <!-- Item 3 -->
                <div class="flex items-center gap-3 p-3 rounded-xl border border-white/20 bg-white/10">
                    <div class="w-2 h-2 rounded-full bg-dream-400"></div>
                    <span class="text-sm text-slate-600 font-medium select-none">Cari Laptop</span>
                </div>
                <!-- Item 4 -->
                <div class="flex items-center gap-3 p-3 rounded-xl border border-white/20 bg-white/10">
                    <div class="w-2 h-2 rounded-full bg-dream-400"></div>
                    <span class="text-sm text-slate-600 font-medium select-none">Voicemail for Isabelle</span>
                </div>
                <!-- Item 5 -->
                <div class="flex items-center gap-3 p-3 rounded-xl border border-white/20 bg-white/10">
                    <div class="w-2 h-2 rounded-full bg-dream-400"></div>
                    <span class="text-sm text-slate-600 font-medium select-none">Yogurt Ubi Cilembu</span>
                </div>
                <!-- Item 6 -->
                <div class="flex items-center gap-3 p-3 rounded-xl border border-white/20 bg-white/10">
                    <div class="w-2 h-2 rounded-full bg-dream-400"></div>
                    <span class="text-sm text-slate-600 font-medium select-none">Tiramisu</span>
                </div>
                <!-- Item 7 -->
                <div class="flex items-center gap-3 p-3 rounded-xl border border-white/20 bg-white/10">
                    <div class="w-2 h-2 rounded-full bg-dream-400"></div>
                    <span class="text-sm text-slate-600 font-medium select-none">Papaya 50% Off</span>
                </div>
            </div>
        </div>

        <!-- Navigation Back -->
        <div class="mt-6 fade-up fade-up-delay-2">
            <a href="../index.html"
                class="glass px-6 py-2.5 rounded-full text-xs sm:text-sm font-medium text-slate-500 hover:text-dream-600 transition-all duration-300 hover:shadow-lg flex items-center gap-2 hover:scale-105 active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" class="w-3.5 h-3.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
                <span>Back to Timer</span>
            </a>
        </div>

    </main>

    <script>
        // ─── Sparkle particles ───
        function createSparkle() {
            const container = document.getElementById('sparkles-container');
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = (30 + Math.random() * 60) + 'vh';
            sparkle.style.animationDuration = (3 + Math.random() * 4) + 's';
            sparkle.style.animationDelay = Math.random() * 2 + 's';
            sparkle.style.width = (2 + Math.random() * 3) + 'px';
            sparkle.style.height = sparkle.style.width;
            container.appendChild(sparkle);

            setTimeout(() => sparkle.remove(), 8000);
        }

        // Start everything
        setInterval(createSparkle, 600);

        // Create initial batch of sparkles
        for (let i = 0; i < 8; i++) {
            setTimeout(createSparkle, i * 200);
        }
    </script>

</body>

</html>
